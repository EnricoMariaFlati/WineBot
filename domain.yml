version: "3.1"

# Intents introdotti di base dal comando 'rasa init'

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - wine_search
  - ask_capabilities
  - ask_characteristics
  - out_of_scope_of_bot
  - wine_pairing
  - explain_specific_characteristic_of_wine
  - get_wine_details
  - compare_wines

entities:
  - budget
  - grape
  - country
  - food
  - term # Per spiegare caratteristiche del vino in particolare
  - wine_name
  - wine_1
  - wine_2

slots:
  budget:
    type: text
    mappings:
    - type: from_text
      conditions:
      - active_loop: wine_search_form
        requested_slot: budget
  grape:
    type: text
    mappings:
    - type: from_text
      conditions:
      - active_loop: wine_search_form
        requested_slot: grape
  country:
    type: text
    mappings:
    - type: from_text
      conditions:
      - active_loop: wine_search_form
        requested_slot: country
  characteristics_list:
    type: text
    mappings:
    - type: custom
  wine_search_results:
    type: text
    mappings:
    - type: custom
  food:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: food
  term:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: term
  wine_name:
    type: text
    influence_conversation: true  # <--- CRUCIALE: forza Rasa a considerare il valore dello slot
    mappings:
    - type: from_entity
      entity: wine_name
  wine_1:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: wine_1
  wine_2:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: wine_2

forms:
  wine_search_form:
    required_slots:
      - budget
      - grape
      - country

actions:
  - action_list_characteristics
  - action_search_wine
  - action_wine_pairing
  - action_explain_specific_characteristic_of_wine
  - action_get_wine_details
  - action_compare_wines

# 2. Bot responses (Utterances)
responses:
  utter_greet:
    - text: "Hello! I am your virtual sommelier. How can I help you today?"

  utter_goodbye:
    - text: "Thank you for chatting with me. Cheers and see you soon!"

  utter_capabilities:
    - text: |
        I am your virtual sommelier! I can help you explore the world of wine in many ways. Here is what you can ask me:
        
        🍷 Wine Search: Want to know everything about a specific wine? Ask me (e.g., "Tell me about The Guv'nor").
        🌍 **Wine selection:** I can help you find the perfect bottle based on your budget and origin.
        🍽️ **Food pairing**: Tell me what you're eating, and I'll suggest the best wine to match your dish! 🥂✨
        📖 Wine Glossary: Curious about technical terms like "tannins" or "full-bodied"? Ask me for a definition! 🔍🍷
        ⚖️ Wine Comparison: Unsure which one to pick? Ask me to compare two wines (e.g., "Compare Merlot and Cabernet").

        Where shall we begin?

  utter_ask_budget:
    - text: "What is your maximum budget for the bottle?"

  utter_ask_grape:
    - text: "Which grape variety are you looking for?"

  utter_ask_country:
    - text: "From which country would you like the wine to be?"

  utter_characteristics_list:
    - text: "Here are the available wine characteristics:\n{characteristics_list}"

  utter_wine_search_results:
    - text: "Here are your wine recommendations:\n{wine_search_results}"

  utter_out_of_scope_of_bot:
    - text: "I'm sorry, but I am a digital sommelier specialized in wine. 🍷 I can't help with other topics, but if you want to talk about grapes, terroir, or food pairings, I'm at your service! 🍇✨"

  # Utterance per il fallback, quando il bot non è sicuro di come rispondere

  utter_default:
    - text: "Sorry, I didn’t understand that. Could you try rephrasing your question?🍷"

# 3. Session configuration
session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true