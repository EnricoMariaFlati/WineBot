version: "3.1"

# Intents introdotti di base dal comando 'rasa init'

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - wine_search
  - ask_capabilities
  - out_of_scope_of_bot
  - wine_pairing
  - explain_specific_characteristic_of_wine
  - get_wine_details
  - compare_wines
  - ask_explain_characteristics
  - ask_explain_grape
  - dont_care
  - inform
  - thank_you
  - cancel_search

entities:
  - Title
  - Price
  - Grape
  - Country
  - Characteristics
  - Type
  - ABV
  - Region
  - Style
  - Vintage
  - Appellation
  - budget
  - grape
  - country
  - food
  - term # Per spiegare caratteristiche del vino in particolare
  - wine_name
  - wine_1
  - wine_2

slots:
  retry_count:
    type: float
    initial_value: 0.0
    influence_conversation: false
    mappings:
      - type: custom
  Title:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: Title
  Price:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity      # Estrae il prezzo se l'utente dice es. "30 dollars"
        entity: Price
      - type: from_intent      # Novità: Se l'utente dice "non lo so", salva "any"
        intent: dont_care
        value: "any"
        conditions:
          - active_loop: wine_search_form
            requested_slot: Price
      - type: from_text
        conditions:
          - active_loop: wine_search_form
            requested_slot: Price

  Grape:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity      # Estrae l'uva se l'utente dice es. "Chardonnay"
        entity: Grape
      - type: from_intent      # Novità: Se l'utente dice "fai tu", salva "any"
        intent: dont_care
        value: "any"
        conditions:
          - active_loop: wine_search_form
            requested_slot: Grape
      - type: from_text
        conditions:
          - active_loop: wine_search_form
            requested_slot: Grape

  Country:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: Country
      - type: from_intent
        intent: dont_care
        value: "any"
        conditions:
          - active_loop: wine_search_form
            requested_slot: Country
      - type: from_text
        conditions:
          - active_loop: wine_search_form
            requested_slot: Country

  Characteristics:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: Characteristics
 
  Type:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: Type
      - type: from_intent
        intent: dont_care
        value: "any"
        conditions:
          - active_loop: wine_search_form
            requested_slot: Type
      - type: from_text
        conditions:
          - active_loop: wine_search_form
            requested_slot: Type

  ABV:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: ABV
  Region:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: Region
  Style:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: Style
  Vintage:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: Vintage
  Appellation:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: Appellation
  characteristics_list:
    type: text
    mappings:
    - type: custom
  wine_search_results:
    type: text
    mappings:
    - type: custom
  food:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: food
  term:
    type: text
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: term
  wine_name:
    type: text
    influence_conversation: true  # <--- CRUCIALE: forza Rasa a considerare il valore dello slot
    mappings:
    - type: from_entity
      entity: wine_name
  wine_1:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: wine_1
  wine_2:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: wine_2

forms:
  wine_search_form:
    ignored_intents:
      - cancel_search
    required_slots:
      - Price  
      - Grape   
      - Country 
      - Type 

actions:
  - action_session_start
  - action_list_characteristics
  - action_search_wine
  - action_wine_pairing
  - action_explain_specific_characteristic_of_wine
  - action_get_wine_details
  - action_compare_wines
  - action_reset_wine_slots
  - validate_wine_search_form

# 2. Bot responses (Utterances)
responses:
  utter_greet:
    - text: "Hello! I am your virtual sommelier. How can I help you today?"

  utter_goodbye:
    - text: "Thank you for chatting with me. Cheers and see you soon!"

  utter_capabilities:
    - text: |
        I am your virtual sommelier! I can help you explore the world of wine in many ways. Here is what you can ask me:
        
        🍷 Wine Search: Want to know everything about a specific wine? Ask me (e.g., "Tell me about The Guv'nor").
        🌍 **Wine selection:** I can help you find the perfect bottle based on your budget and origin.
        🍽️ **Food pairing**: Tell me what you're eating, and I'll suggest the best wine to match your dish! 🥂✨
        📖 Wine Glossary: Curious about technical terms like "tannins" or "full-bodied"? Ask me for a definition! 🔍🍷
        ⚖️ Wine Comparison: Unsure which one to pick? Ask me to compare two wines (e.g., "Compare Merlot and Cabernet").

        Where shall we begin?

  utter_ask_Price:
    - text: "What is your budget for the bottle?"

  utter_ask_Grape:
    - text: "Which grape variety are you looking for?"
  
  utter_ask_Country:
    - text: "From which country would you like the wine to be?"

  utter_ask_Type:
    - text: "Do you have any specific type of wine in mind? (Brown, Mixed, Orange, Red, Rosé, Tawny, White)"

  # --- SPIEGAZIONI (INTERRUZIONI) ---
  utter_explain_grape:
    - text: "The grape refers to the variety of fruit used to make the wine. Some popular examples are Chardonnay, Sauvignon Blanc, Merlot, or Pinot Noir."

  utter_explain_characteristics:
    - text: "By characteristics, I mean the specific aromas and flavors you enjoy in a wine, like 'fruity', 'vanilla', 'oak', 'spicy', or 'floral' notes."

  utter_cancel_search:
    - text: "Ok, you have exited the search. Here is what I can do for you:"

  utter_welcome:
    - text: "You're very welcome! 🍷 Let me know if you'd like to search for another bottle, or if you want to know more about wine characteristics."

  utter_welcome_capabilities:
    - text: "You're very welcome! 🍷 If I can do another thing for you just ask me. Here is a reminder of my capabilities:"
  
  utter_anything_else:
    - text: "Alright, no problem! Let me know if you want to explore other wine characteristics or if you need anything else."
  
  utter_characteristics_list:
    - text: "Here are the available wine characteristics:\n{characteristics_list}"

  utter_wine_search_results:
    - text: "Here are your wine recommendations:\n{wine_search_results}"

  utter_out_of_scope_of_bot:
    - text: "I'm sorry, but I am a digital sommelier specialized in wine. 🍷 I can't help with other topics, but if you want to talk about grapes, terroir, or food pairings, I'm at your service! 🍇✨"

  # Utterance per il fallback, quando il bot non è sicuro di come rispondere

  utter_default:
    - text: "Sorry, I didn’t understand that. Could you try rephrasing your question?🍷"

# 3. Session configuration
session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true