version: "3.1"

# Intents introdotti di base dal comando 'rasa init'

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - mood_great
  - mood_unhappy
  - bot_challenge
  - search_wine

responses:
  utter_greet:
  - text: "Hey! How are you?"

  utter_cheer_up:
  - text: "Here is something to cheer you up:"
    image: "https://i.imgur.com/nGF1K8f.jpg"

  utter_did_that_help:
  - text: "Did that help you?"

  utter_happy:
  - text: "Great, carry on!"

  utter_goodbye:
  - text: "Bye"

  utter_iamabot:
  - text: "I am a bot, powered by Rasa."

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true

# Intents creati per il progetto del rasa bot

entities:
  - grape
  - wine_type
  - country
  - price

slots:
  grape:
    type: text
    mappings:
      - type: from_entity
        entity: grape
  wine_type:
    type: text
    mappings:
      - type: from_entity
        entity: wine_type
  country:
    type: text
    mappings:
      - type: from_entity
        entity: country

actions:
  - action_search_wine