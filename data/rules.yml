version: "3.1"

# Rules introdotti di base dal comando 'rasa init'

rules:

- rule: Respond to greeting anytime
  steps:
  - intent: greet
  - action: utter_greet

- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

# Rules introdotte per il progetto del wine bot

- rule: Always respond to user asking for bot capabilities
  steps:
  - intent: ask_capabilities
  - action: utter_capabilities



- rule: Activate wine search form
  steps:
  - intent: wine_search
  # RIMOSSO: action_reset_wine_slots per non cancellare la frase dell'utente
  - action: wine_search_form
  - active_loop: wine_search_form

- rule: Submit wine search form
  condition:
  - active_loop: wine_search_form
  steps:
  - action: wine_search_form
  - active_loop: null
  - slot_was_set:
    - requested_slot: null
  - action: action_search_wine
  - action: action_reset_wine_slots # CORRETTO: A ricerca finita, svuotiamo per la prossima

- rule: Explain characteristics anytime
  steps:
  - intent: ask_explain_characteristics
  - action: utter_explain_characteristics
  - action: action_list_characteristics
  - action: utter_characteristics_list

- rule: Explain grape anytime
  steps:
  - intent: ask_explain_grape
  - action: utter_explain_grape

- rule: Handle out-of-scope_of_bot requests
  steps:
    - intent: out_of_scope_of_bot
    - action: utter_out_of_scope_of_bot

- rule: Respond to wine_pairing requests
  steps:
    - intent: wine_pairing
    - action: action_wine_pairing

- rule: explain_specific_characteristic_of_wine
  steps:
  - intent: explain_specific_characteristic_of_wine
  - action: action_explain_specific_characteristic_of_wine

# Rule per il fallback, quando il bot non è sicuro di come rispondere

- rule: Implementation of Fallback
  steps:
  - intent: nlu_fallback
  - action: utter_default

- rule: Rispondi ai dettagli vino
  steps:
  - intent: get_wine_details
  - action: action_get_wine_details

- rule: compare wines
  steps:
    - intent: compare_wines
    - action: action_compare_wines

- rule: Cancel wine search form
  condition:
  - active_loop: wine_search_form
  steps:
  - intent: cancel_search
  - action: action_deactivate_loop
  - active_loop: null
  - action: action_reset_wine_slots
  - action: utter_cancel_search
  - action: utter_capabilities

- rule: Respond to thank you anytime
  steps:
  - intent: thank_you
  - action: utter_welcome_capabilities
  - action: utter_capabilities