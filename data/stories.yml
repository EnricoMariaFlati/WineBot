version: "3.1"

stories:
  - story: User starts a new search after a previous one
    steps:
      - intent: wine_search
      - action: wine_search_form
      - active_loop: wine_search_form
      - active_loop: null
      - slot_was_set:
          - requested_slot: null
      - action: action_search_wine
      - action: action_reset_wine_slots
      # Il bot ha mostrato i vini (o gli 0 risultati) e svuotato la memoria.
      # L'utente decide di fare una nuova ricerca inserendo nuovi parametri:
      - intent: wine_search 
      - action: wine_search_form
      - active_loop: wine_search_form



  - story: User wants to try again after search
    steps:
      - intent: wine_search
      - action: wine_search_form
      - active_loop: wine_search_form
      - active_loop: null
      - slot_was_set:
          - requested_slot: null
      - action: action_search_wine
      - action: action_reset_wine_slots
      # Il bot ha appena fatto la domanda. L'utente risponde "sì":
      - intent: affirm
      # Dato che gli slot sono già vuoti, rilanciamo semplicemente il form
      - action: wine_search_form
      - active_loop: wine_search_form

  # SCENARIO 2: L'utente dice "No" e non vuole riprovare
  - story: User does not want to try again after search
    steps:
      - intent: wine_search
      - action: wine_search_form
      - active_loop: wine_search_form
      - active_loop: null
      - slot_was_set:
          - requested_slot: null
      - action: action_search_wine
      - action: action_reset_wine_slots
      # Il bot ha appena fatto la domanda. L'utente risponde "no":
      - intent: deny
      # Il bot accetta il rifiuto educatamente. La memoria è già vuota.
      - action: utter_anything_else

  - story: Complete onboarding before search (Warm Start)
    steps:
      - intent: greet
      - action: utter_greet
      - intent: ask_capabilities
      - action: utter_capabilities
      - intent: wine_search
      - action: wine_search_form
      - active_loop: wine_search_form

  - story: Interruption for grape explanation during search form
    steps:
      - intent: wine_search
      - action: wine_search_form
      - active_loop: wine_search_form
      # The user interrupts the form for a FAQ
      - intent: ask_explain_grape
      - action: utter_explain_grape
      # The bot remembers to resume the form
      - action: wine_search_form
      - active_loop: wine_search_form

  - story: Complete and polite conversation cycle
    steps:
      - intent: greet
      - action: utter_greet
      - intent: wine_search
      - action: wine_search_form
      - active_loop: wine_search_form
      - active_loop: null
      - slot_was_set:
          - requested_slot: null
      - action: action_search_wine
      - action: action_reset_wine_slots
      - intent: goodbye
      - action: utter_goodbye
