version: "3.1"

stories:

# ---------------------------------------------------
  # CASO 1: RICERCA FALLITA
  # ---------------------------------------------------
  
  - story: Search failed, user wants to try again
    steps:
    - action: action_search_wine
    - slot_was_set:
      - search_successful: false
    - action: action_reset_wine_slots
    - intent: affirm
    - action: wine_search_form
    - active_loop: wine_search_form

  - story: Search failed, user DOES NOT want to try again
    steps:
    - action: action_search_wine
    - slot_was_set:
      - search_successful: false
    - action: action_reset_wine_slots
    - intent: deny
    - action: utter_anything_else

  # ---------------------------------------------------
  # CASO 2: RICERCA RIUSCITA
  # ---------------------------------------------------

  - story: Search successful, user thanks after details
    steps:
    - action: action_search_wine
    - slot_was_set:
      - search_successful: true
    - action: action_reset_wine_slots 
    - action: action_get_wine_details
    - intent: thank_you
    # Assicurati di aver rimosso la regola globale in rules.yml per non avere errori!
    - action: utter_welcome
    
  - story: Complete onboarding before search (Warm Start)
    steps:
      - intent: greet
      - action: utter_greet
      - intent: ask_capabilities
      - action: utter_capabilities
      - intent: wine_search
      - action: wine_search_form
      - active_loop: wine_search_form

  - story: Interruption for grape explanation during search form
    steps:
      - intent: wine_search
      - action: wine_search_form
      - active_loop: wine_search_form
      # The user interrupts the form for a FAQ
      - intent: ask_explain_grape
      - action: utter_explain_grape
      # The bot remembers to resume the form
      - action: wine_search_form
      - active_loop: wine_search_form

  - story: Complete and polite conversation cycle
    steps:
      - intent: greet
      - action: utter_greet
      - intent: wine_search
      - action: wine_search_form
      - active_loop: wine_search_form
      - active_loop: null
      - slot_was_set:
          - requested_slot: null
      - action: action_search_wine
      - action: action_reset_wine_slots
      - intent: goodbye
      - action: utter_goodbye

