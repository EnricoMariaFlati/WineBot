# Intents creati per il progetto del wine bot

- intent: wine_search
  examples: |
    - I am looking for a [white](wine_type) wine
    - search for a [Tempranillo](grape) from [Spain](country)
    - do you have any [Chardonnay](grape) wine?
    - suggest a [Red](wine_type) wine
    - I would like to drink a wine from [California](country)
    - can you find me a [Tempranillo](grape)?
    - looking for a bottle of wine
    - I want to buy [Chardonnay](grape)
    - i want to find a wine
    - help me choose a wine
    - i need a wine recommendation
    - suggest a wine
    - search for a wine
    - find me a good bottle
    - I am looking for a wine

- intent: ask_capabilities
  examples: |
    - what can you do?
    - how can you help me?
    - give me a hand
    - what kind of information do you have about wines?
    - what can I ask you?
    - what are your capabilities?
    - can you list what you can do?
    - I don't know what to ask
    - help me
    - what parameters do you use to search for wines?
    
- intent: ask_characteristics
  examples: |
    - what are the characteristics of your wines?
    - list wine characteristics
    - can you tell me the available wine characteristics?
    - what features do the wines have?
    - show me the characteristics list
    - what kind of flavors are there?
    - which characteristics can I find?

- intent: out_of_scope_of_bot
  examples: |
    - Who won the world cup?
    - How do I make a carbonara?
    - What is the weather like today?
    - Tell me about politics
    - Who is the president?
    - Can you tell me a joke?
    - How are you?